<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta name="google-site-verification" content="8642823b2c99ac36" />
  
  <title>Movie Magic - Latest Movies 2026</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">

  <style>
    :root { --blue: #1a73e8; --bg: #0a0a0a; --card: #1c1c1c; --glow: rgba(26, 115, 232, 0.4); }
    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--bg); color: white; overflow-x: hidden; }

    /* Loading Spinner */
    #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s; }
    .spinner { width: 40px; height: 40px; border: 4px solid #222; border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    /* UI Layout */
    header { background: var(--blue); padding: 15px; text-align: center; font-size: 22px; font-weight: bold; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px var(--glow); }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #111; font-size: 11px; }
    #shareBtn { background: #222; color: #fff; border: 1px solid #444; padding: 5px 12px; border-radius: 20px; cursor: pointer; }

    .search-container { padding: 15px; text-align: center; background: #111; }
    #movieSearch { width: 90%; max-width: 400px; padding: 12px 18px; border-radius: 25px; border: 1px solid #333; background: #222; color: white; outline: none; }

    .filter-container { display: flex; overflow-x: auto; gap: 8px; padding: 12px; background: #111; border-bottom: 1px solid #333; scrollbar-width: none; }
    .filter-btn { background: #222; color: #bbb; border: 1px solid #333; padding: 6px 15px; border-radius: 20px; font-size: 11px; white-space: nowrap; cursor: pointer; }
    .filter-btn.active { background: var(--blue); color: white; }

    /* Grid: 2 Columns Mobile */
    .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px; max-width: 1200px; margin: 0 auto; }
    @media (min-width: 768px) { .movie-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); } }

    .movie-card { background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid #333; cursor: pointer; transition: transform 0.2s; }
    .movie-card:hover { transform: translateY(-5px); border-color: var(--blue); }
    .poster-box { position: relative; width: 100%; aspect-ratio: 2/3; background: #000; }
    .poster-box img { width: 100%; height: 100%; object-fit: cover; }
    .rating { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); color: #ffcc00; padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    .movie-title { font-size: 12px; font-weight: bold; padding: 10px; text-align: center; display: block; min-height: 32px; }

    /* Modal Popup */
    #movieModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; overflow-y: auto; }
    .modal-content { max-width: 500px; margin: 20px auto; background: #1a1a1a; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid #333; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-close { position: absolute; top: 15px; right: 15px; background: #000; color: white; border-radius: 50%; width: 35px; height: 35px; border: none; cursor: pointer; z-index: 10; font-weight: bold; }
    .modal-img { width: 100%; height: 260px; object-fit: cover; }
    .modal-info { padding: 25px; }
    .m-tag { background: var(--blue); padding: 4px 10px; border-radius: 5px; font-size: 10px; margin-right: 5px; font-weight: bold; }
    .m-desc { font-size: 14px; color: #ccc; line-height: 1.6; margin: 15px 0; }
    .modal-dl-btn { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 15px; }

    .tg-float { position: fixed; bottom: 20px; right: 20px; background: #0088cc; color: white; padding: 12px 20px; border-radius: 30px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 99; font-size: 13px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="loader"><div class="spinner"></div></div>

  <header>🎬 MOVIE MAGIC</header>

  <div class="top-bar">
    <span>Online: MovieMagic Portal</span>
    <button id="shareBtn" onclick="copySiteLink()">🔗 Share Site</button>
  </div>

  <div class="search-container">
    <input type="text" id="movieSearch" placeholder="Search movies, anime..." onkeyup="filterMovies()">
  </div>

  <div class="filter-container">
    <button class="filter-btn active" onclick="filterCategory('all', this)">All</button>
    <button class="filter-btn" onclick="filterCategory('action', this)">Action</button>
    <button class="filter-btn" onclick="filterCategory('anime', this)">Anime</button>
    <button class="filter-btn" onclick="filterCategory('kdrama', this)">K-Drama</button>
    <button class="filter-btn" onclick="filterCategory('series', this)">Series</button>
  </div>

  <div class="movie-grid" id="mainGrid">
    <div class="movie-card" data-category="series action" 
         onclick="showDetails(
           'Peaky Blinders: The Immortal Man (2026)', 
           '1940: As WWII begins, an older Tommy Shelby returns to the streets of Birmingham to protect his family and legacy one final time.', 
           'Cillian Murphy, Barry Keoghan', 
           '1 hr 52 min', 
           'https://th.bing.com/th/id/OIF.Ogb2sbe5diDvL3gRlodeeg?w=258&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3', 
           'https://cuty.io/LpsVutE1'
         )">
      <div class="poster-box">
        <span class="rating">⭐ 8.2</span>
        <img src="https://th.bing.com/th/id/OIF.Ogb2sbe5diDvL3gRlodeeg?w=258&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3">
      </div>
      <span class="movie-title">Peaky Blinders (2026)</span>
    </div>
  </div>

  <div id="movieModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeDetails()">✕</button>
      <img id="mImg" class="modal-img">
      <div class="modal-info">
        <h2 id="mTitle" style="margin: 0; font-size: 20px;"></h2>
        <div style="margin: 10px 0;"><span class="m-tag" id="mTime"></span> <span class="m-tag" style="background:#444;">HD 480p</span></div>
        <p class="m-desc" id="mDesc"></p>
        <p style="font-size: 11px; color: #888;"><b>Cast:</b> <span id="mCast"></span></p>
        <button id="mDlLink" class="modal-dl-btn">Download Now</button>
      </div>
    </div>
  </div>

  <a href="https://t.me/your_channel" class="tg-float" target="_blank">Join Telegram 🚀</a>

  <script>
    function showDetails(title, desc, cast, time, img, link) {
      document.getElementById('mTitle').innerText = title;
      document.getElementById('mDesc').innerText = desc;
      document.getElementById('mCast').innerText = cast;
      document.getElementById('mTime').innerText = time;
      document.getElementById('mImg').src = img;
      document.getElementById('mDlLink').onclick = () => window.open(link);
      document.getElementById('movieModal').style.display = 'block';
      document.body.style.overflow = 'hidden';
    }
    function closeDetails() { document.getElementById('movieModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
    window.addEventListener("load", () => { setTimeout(() => document.getElementById("loader").classList.add("loader-hidden"), 800); });
    function filterMovies() {
      let input = document.getElementById('movieSearch').value.toLowerCase();
      let cards = document.getElementsByClassName('movie-card');
      for (let i = 0; i < cards.length; i++) {
        let title = cards[i].querySelector('.movie-title').innerText.toLowerCase();
        cards[i].classList.toggle('hidden', !title.includes(input));
      }
    }
    function filterCategory(category, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      let cards = document.getElementsByClassName('movie-card');
      for (let i = 0; i < cards.length; i++) {
        let cats = cards[i].getAttribute('data-category');
        cards[i].classList.toggle('hidden', category !== 'all' && !cats.includes(category));
      }
    }
    function copySiteLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.getElementById("shareBtn");
        btn.innerHTML = "✅ Copied!";
        setTimeout(() => btn.innerHTML = "🔗 Share Site", 2000);
      });
    }
  </script>
</body>
</html>
