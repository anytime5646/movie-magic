<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Magic</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">

  <style>
    :root { 
      --blue: #1a73e8; 
      --bg: #0a0a0a; 
      --card: #1c1c1c; 
      --glow: rgba(26, 115, 232, 0.4);
    }

    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--bg); color: white; overflow-x: hidden; }

    /* 1. Loading Spinner */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg); display: flex; justify-content: center; align-items: center;
      z-index: 9999; transition: opacity 0.5s ease;
    }
    .spinner {
      width: 50px; height: 50px; border: 5px solid #222;
      border-top: 5px solid var(--blue); border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    /* 2. Header & Top Bar */
    header { 
      background: var(--blue); padding: 15px; text-align: center; 
      font-size: 24px; font-weight: bold; position: sticky; top: 0; 
      z-index: 100; box-shadow: 0 4px 15px var(--glow); 
    }

    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #111; }
    
    #shareBtn {
      background: #222; color: #fff; border: 1px solid #444; padding: 6px 12px;
      border-radius: 20px; font-size: 11px; cursor: pointer; transition: 0.3s;
    }

    /* 3. Search & Filters */
    .search-container { padding: 15px; text-align: center; background: #111; }
    #movieSearch {
      width: 90%; max-width: 500px; padding: 12px 20px;
      border-radius: 25px; border: 1px solid #444; background: #222;
      color: white; outline: none; transition: 0.3s;
    }
    #movieSearch:focus { border-color: var(--blue); box-shadow: 0 0 10px var(--blue); }

    .filter-container { 
      display: flex; flex-wrap: wrap; justify-content: center; 
      gap: 8px; padding: 10px; background: #111; border-bottom: 1px solid #333; 
    }
    .filter-btn {
      background: #222; color: #bbb; border: 1px solid #444; padding: 8px 15px;
      border-radius: 20px; font-size: 11px; cursor: pointer; transition: 0.3s;
    }
    .filter-btn.active, .filter-btn:hover { background: var(--blue); color: white; border-color: var(--blue); }

    /* 4. Movie Grid */
    .movie-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); 
      gap: 12px; padding: 15px; max-width: 1200px; margin: 0 auto;
    }
    @media (min-width: 768px) {
      .movie-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    }

    .movie-card {
      background: var(--card); border-radius: 10px; overflow: hidden;
      border: 1px solid #333; display: flex; flex-direction: column;
      transition: transform 0.2s, border-color 0.2s;
    }
    .movie-card:hover { transform: translateY(-5px); border-color: var(--blue); }

    .poster-box { position: relative; width: 100%; aspect-ratio: 2/3; background: #000; }
    .poster-box img { width: 100%; height: 100%; object-fit: cover; }

    .rating {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.8); color: #ffcc00;
      padding: 4px 8px; border-radius: 5px; font-size: 11px; font-weight: bold;
    }

    .info { padding: 10px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .movie-title { font-size: 13px; font-weight: bold; margin-bottom: 10px; display: block; line-height: 1.3; color: #eee; }

    .dl-btn {
      background: var(--blue); color: white; border: none;
      padding: 10px; border-radius: 6px; width: 100%;
      font-weight: bold; cursor: pointer; font-size: 12px;
    }

    /* 5. Telegram Floating Button */
    .tg-float {
      position: fixed; bottom: 20px; right: 20px;
      background: #0088cc; color: white; padding: 12px 20px;
      border-radius: 30px; text-decoration: none; font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 99; font-size: 14px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="loader"><div class="spinner"></div></div>

  <header>🎬 MOVIE MAGIC</header>

  <div class="top-bar">
    <span style="font-size: 11px; color: #888;">Live: Movies & Series 2026</span>
    <button id="shareBtn" onclick="copySiteLink()">🔗 Share Site</button>
  </div>

  <div class="search-container">
    <input type="text" id="movieSearch" placeholder="Search movies..." onkeyup="filterMovies()">
  </div>

  <div class="filter-container">
    <button class="filter-btn active" onclick="filterCategory('all', this)">All</button>
    <button class="filter-btn" onclick="filterCategory('action', this)">Action</button>
    <button class="filter-btn" onclick="filterCategory('series', this)">Series</button>
    <button class="filter-btn" onclick="filterCategory('drama', this)">Drama</button>
  </div>

  <div class="movie-grid" id="mainGrid">
    
    <div class="movie-card" data-category="drama series action">
      <div class="poster-box">
        <span class="rating">⭐ 8.2</span>
        <img src="https://th.bing.com/th/id/OIF.Ogb2sbe5diDvL3gRlodeeg?w=258&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3">
      </div>
      <div class="info">
        <span class="movie-title">Peaky Blinders: The Immortal Man (2026) [480p]</span>
        <button class="dl-btn" onclick="window.open('https://cuty.io/LpsVutE1')">Download Now</button>
      </div>
    </div>

    <div class="movie-card" data-category="action">
      <div class="poster-box">
        <span class="rating">⭐ 0.0</span>
        <div style="color:#444; padding-top:50%; text-align:center; font-size: 11px;">Next Movie</div>
      </div>
      <div class="info">
        <span class="movie-title">Add Your Next Movie Title</span>
        <button class="dl-btn">Coming Soon</button>
      </div>
    </div>

  </div>

  <a href="https://t.me/your_channel" class="tg-float" target="_blank">Join Telegram 🚀</a>

  <script>
    // Loading Spinner
    window.addEventListener("load", () => {
      setTimeout(() => document.getElementById("loader").classList.add("loader-hidden"), 800);
    });

    // Search Logic
    function filterMovies() {
      let input = document.getElementById('movieSearch').value.toLowerCase();
      let cards = document.getElementsByClassName('movie-card');
      for (let i = 0; i < cards.length; i++) {
        let title = cards[i].querySelector('.movie-title').innerText.toLowerCase();
        cards[i].classList.toggle('hidden', !title.includes(input));
      }
    }

    // Category Logic
    function filterCategory(category, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      let cards = document.getElementsByClassName('movie-card');
      for (let i = 0; i < cards.length; i++) {
        let cats = cards[i].getAttribute('data-category');
        cards[i].classList.toggle('hidden', category !== 'all' && !cats.includes(category));
      }
    }

    // Share Logic
    function copySiteLink() {
      const btn = document.getElementById("shareBtn");
      navigator.clipboard.writeText(window.location.href).then(() => {
        btn.innerHTML = "✅ Copied!";
        setTimeout(() => btn.innerHTML = "🔗 Share Site", 2000);
      });
    }
  </script>

</body>
</html>
