<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Magic</title>
  <style>
    /* Global Styles */
    :root {
      --primary-blue: #1a73e8;
      --glow-blue: rgba(26, 115, 232, 0.6);
      --bg-dark: #111;
      --card-bg: #222;
    }

    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      margin: 0; 
      background: var(--bg-dark); 
      color: white; 
      scroll-behavior: smooth;
    }

    /* Modern Blue Header with Glow */
    header { 
      background: var(--primary-blue); 
      padding: 20px; 
      text-align: center; 
      font-size: 28px; 
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 20px var(--glow-blue);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Search Area */
    .search-section {
      padding: 25px 15px;
      text-align: center;
    }

    #movieSearch {
      width: 90%;
      max-width: 500px;
      padding: 14px;
      border-radius: 30px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: white;
      outline: none;
      transition: border 0.3s, box-shadow 0.3s;
    }

    #movieSearch:focus {
      border-color: var(--primary-blue);
      box-shadow: 0 0 10px var(--glow-blue);
    }

    /* Category Filter Tags */
    .filter-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      max-width: 800px;
      margin: 0 auto 20px auto;
    }

    .tag {
      background: #252525;
      color: #bbb;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid #333;
      transition: all 0.3s ease;
    }

    .tag:hover {
      background: var(--primary-blue);
      color: white;
      border-color: var(--primary-blue);
      box-shadow: 0 0 10px var(--glow-blue);
      transform: translateY(-2px);
    }

    .tag.special {
      background: #0088cc; /* Telegram Blue */
      color: white;
      border: none;
    }

    /* Movie Grid (2 Columns for Mobile) */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      padding: 15px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .movie-card {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #333;
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
    }

    .movie-card:hover {
      transform: translateY(-8px);
      border-color: var(--primary-blue);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 15px var(--glow-blue);
    }

    /* Poster Placeholder Area */
    .poster {
      width: 100%;
      aspect-ratio: 2/3;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-weight: bold;
      position: relative;
    }

    /* Rating Badge */
    .rating {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.8);
      color: #ffcc00;
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: bold;
    }

    .info-area {
      padding: 12px;
      text-align: center;
    }

    .movie-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
    }

    .watch-btn {
      background: var(--primary-blue);
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      width: 100%;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: opacity 0.3s;
    }

    .watch-btn:hover {
      opacity: 0.9;
    }

    /* Hide cards for Search */
    .hidden { display: none !important; }

  </style>
</head>
<body>

<header>🎬 Movie Magic</header>

<div class="search-section">
  <input type="text" id="movieSearch" placeholder="Search for titles..." onkeyup="filterContent()">
</div>

<div class="filter-container">
  <a href="#" class="tag">Movies</a>
  <a href="#" class="tag">Web Series</a>
  <a href="#" class="tag">Anime</a>
  <a href="#" class="tag">K-Drama</a>
  <a href="#" class="tag special">Join Telegram</a>
</div>

<div class="movie-card">
  <div class="poster">
    <span class="rating">⭐ 8.2</span>
    <img src="https://th.bing.com/th/id/OIF.Ogb2sbe5diDvL3gRlodeeg?w=258&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" alt="Peaky Blinders The Immortal Man">
  </div>
  <div class="info-area">
    <span class="movie-title">Peaky Blinders: The Immortal Man (2026) [480p]</span>
    <button class="watch-btn" onclick="window.open('https://cuty.io/LpsVutE1')">Download Now</button>
  </div>
</div>

<script>
  function filterContent() {
    let input = document.getElementById('movieSearch').value.toLowerCase();
    let cards = document.getElementsByClassName('movie-card');

    for (let i = 0; i < cards.length; i++) {
      let title = cards[i].querySelector('.movie-title').innerText.toLowerCase();
      if (title.includes(input)) {
        cards[i].classList.remove('hidden');
      } else {
        cards[i].classList.add('hidden');
      }
    }
  }
</script>

</body>
</html>
